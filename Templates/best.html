{% extends 'base.html' %}

{% block content %}

<div class="month-work">
    {% for monthkey, monthval in month_dict.items() %}
    <h2 class="month-year">{{monthkey}}</h2>
    {% for val in monthval %}
    {% if val is not number %}
    <h2 class="value-name">{{val.name}}</h2>
    <p class="value-desc">{{val.desc}}</p>
    {% endif %}
    {% endfor %}
    {% endfor %}
</div>


{% endblock content %}
